<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Results — VerifiedNG</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="styles/search.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  </head>
  <body>
    <!-- NAV -->
    <nav>
      <a href="index.html" class="logo"
        >Verified<span>NG</span> <sup>BETA</sup></a
      >
      <div class="nav-search">
        <input
          type="text"
          id="navServiceInput"
          placeholder="Service (e.g. Plumber, Tutor)" />
        <div class="nav-divider"></div>
        <input type="text" id="navLocationInput" placeholder="Location" />
        <button class="btn-primary" onclick="handleSearch()">
          Find <i class="bi bi-search"></i>
        </button>
      </div>
      <div class="nav-actions">
        <button
          class="btn-ghost"
          id="navLoginBtn"
          onclick="window.location.href = 'login.html'">
          Log In
        </button>
        <button
          class="btn-primary"
          id="navSignupBtn"
          onclick="goToProviderSignup()">
          Sign Up Free
        </button>
      </div>
    </nav>

    <!-- SEARCH HEADER -->
    <div class="search-header">
      <h1 id="searchTitle">
        Results for <span id="searchTermDisplay">"Plumber"</span>
      </h1>
      <div class="search-meta">
        <p><strong id="resultCount">#</strong> verified providers found</p>
        <span class="result-tag" id="locationDisplay"
          ><i class="bi bi-geo-alt-fill"></i> Lagos</span
        >
      </div>
    </div>

    <!-- FILTER OVERLAY (mobile) -->
    <div class="filter-overlay" id="filterOverlay" onclick="closeFilters()">
      <div
        class="filter-drawer"
        id="filterDrawer"
        onclick="event.stopPropagation()">
        <button class="drawer-close" onclick="closeFilters()">✕</button>
        <div id="drawerContent"></div>
      </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="main-layout">
      <!-- SIDEBAR FILTERS -->
      <aside class="filters" id="sidebarFilters">
        <div class="filters-title">
          Filters
          <button class="clear-btn" onclick="clearFilters()">Clear all</button>
        </div>

        <!-- Category -->
        <div class="filter-group">
          <div class="filter-label">Category</div>
          <div class="filter-options" id="categoryFilter">
            <label class="filter-option"
              ><input
                type="checkbox"
                value="Catering"
                onchange="applyFilters()" />
              Catering <span class="filter-count">12</span></label
            >
            <label class="filter-option"
              ><input
                type="checkbox"
                value="Programming"
                onchange="applyFilters()" />
              Programmer <span class="filter-count">8</span></label
            >
            <label class="filter-option"
              ><input
                type="checkbox"
                value="Tutoring"
                onchange="applyFilters()" />
              Tutor <span class="filter-count">20</span></label
            >
            <label class="filter-option"
              ><input
                type="checkbox"
                value="Auto Mechanic"
                onchange="applyFilters()" />
              Mechanic <span class="filter-count">6</span></label
            >
            <label class="filter-option"
              ><input
                type="checkbox"
                value="ContentCreator"
                onchange="applyFilters()" />
              Content Creator <span class="filter-count">9</span></label
            >
            <label class="filter-option"
              ><input
                type="checkbox"
                value="Electrical"
                onchange="applyFilters()" />
              Electrician <span class="filter-count">5</span></label
            >
            <label class="filter-option"
              ><input
                type="checkbox"
                value="Tailoring"
                onchange="applyFilters()" />
              Tailor <span class="filter-count">14</span></label
            >
            <label class="filter-option"
              ><input
                type="checkbox"
                value="Plumbing"
                onchange="applyFilters()" />
              Plumber <span class="filter-count">5</span></label
            >
            <label class="filter-option"
              ><input
                type="checkbox"
                value="Cleaning"
                onchange="applyFilters()" />
              Cleaner <span class="filter-count">5</span></label
            >
          </div>
        </div>

        <!-- Rating -->
        <div class="filter-group">
          <div class="filter-label">Minimum Rating</div>
          <div class="rating-filter" id="ratingFilter">
            <label class="rating-option"
              ><input
                type="radio"
                name="rating"
                value="0"
                onchange="applyFilters()"
                checked />
              Any rating</label
            >
            <label class="rating-option"
              ><input
                type="radio"
                name="rating"
                value="4"
                onchange="applyFilters()" />
              <span class="rating-stars">★★★★</span> 4.0 & above</label
            >
            <label class="rating-option"
              ><input
                type="radio"
                name="rating"
                value="4.5"
                onchange="applyFilters()" />
              <span class="rating-stars">★★★★★</span> 4.5 & above</label
            >
            <label class="rating-option"
              ><input
                type="radio"
                name="rating"
                value="4.8"
                onchange="applyFilters()" />
              <span class="rating-stars">★★★★★</span> 4.8 & above</label
            >
          </div>
        </div>

        <!-- Location -->
        <div class="filter-group">
          <div class="filter-label">Location (State)</div>
          <div class="filter-options" id="locationFilter">
            <label class="filter-option"
              ><input type="checkbox" value="Lagos" onchange="applyFilters()" />
              Lagos <span class="filter-count">34</span></label
            >
            <label class="filter-option"
              ><input type="checkbox" value="Warri" onchange="applyFilters()" />
              Warri <span class="filter-count">18</span></label
            >
            <label class="filter-option"
              ><input type="checkbox" value="Kwara" onchange="applyFilters()" />
              Kwara <span class="filter-count">12</span></label
            >
            <label class="filter-option"
              ><input type="checkbox" value="Ogun" onchange="applyFilters()" />
              Ogun <span class="filter-count">9</span></label
            >
            <label class="filter-option"
              ><input
                type="checkbox"
                value="Port Harcourt"
                onchange="applyFilters()" />
              Port Harcourt <span class="filter-count">7</span></label
            >
          </div>
        </div>

        <!-- Availability -->
        <div class="filter-group">
          <div class="filter-label">Availability</div>
          <div class="filter-options">
            <label class="filter-option"
              ><input
                type="checkbox"
                value="available"
                onchange="applyFilters()" />
              Available Now</label
            >
            <label class="filter-option"
              ><input
                type="checkbox"
                value="weekend"
                onchange="applyFilters()" />
              Available Weekends</label
            >
            <label class="filter-option"
              ><input type="checkbox" value="24hr" onchange="applyFilters()" />
              24/7 Available</label
            >
          </div>
        </div>
      </aside>

      <!-- RESULTS -->
      <main class="results-area">
        <!-- SORT BAR -->
        <div class="sort-bar">
          <div class="sort-left">
            <button class="mobile-filter-btn" onclick="openFilters()">
              <i class="bi bi-sliders"></i> Filters
            </button>
            <span class="active-filter-tag" id="activeServiceTag">
              <i class="bi bi-wrench"></i> Plumber
              <button onclick="removeServiceFilter()">✕</button>
            </span>
            <span
              class="active-filter-tag"
              id="activeLocationTag"
              style="display: none">
              <i class="bi bi-geo-alt"></i> Lagos
              <button onclick="removeLocationFilter()">✕</button>
            </span>
          </div>
          <div class="sort-right">
            <span class="sort-label">Sort by:</span>
            <select
              class="sort-select"
              id="sortSelect"
              onchange="applyFilters()">
              <option value="rating">Highest Rated</option>
              <option value="jobs">Most Jobs Done</option>
              <option value="newest">Newest</option>
            </select>
            <div class="view-toggle">
              <button class="view-btn active" onclick="setView('grid', this)">
                <i class="bi bi-grid"></i>
              </button>
              <button class="view-btn" onclick="setView('list', this)">
                <i class="bi bi-list"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- RESULTS GRID -->
        <div class="results-grid" id="resultsGrid"></div>

        <!-- PAGINATION -->
        <div class="pagination">
          <button class="page-btn"><i class="bi bi-chevron-left"></i></button>
          <button class="page-btn active">1</button>
          <button class="page-btn">2</button>
          <button class="page-btn">3</button>
          <button class="page-btn"><i class="bi bi-chevron-right"></i></button>
        </div>
      </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/providers-data.js"></script>
    <script src="js/search.js"></script>
  </body>
</html>
