<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — VerifiedNG</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="styles/login.css" />
  </head>
  <body>
    <nav>
      <a href="index.html" class="logo"
        >Verified<span>NG</span> <sup>BETA</sup></a
      >
    </nav>

    <div class="main-grid">
      <div class="left-panel">
        <a href="index.html" class="panel-logo"
          >Verified<span>NG</span> <sup>BETA</sup></a
        >
        <div class="panel-content">
          <div class="panel-tag">Security</div>
          <h2 class="panel-title">Reset Your <em>Password</em></h2>
          <p class="panel-desc">
            Choose a strong password to keep your VerifiedNG account secure.
          </p>
          <div class="panel-features">
            <div class="feature-item">
              <div class="feature-icon"><i class="bi bi-lock"></i></div>
              Minimum 8 characters
            </div>
            <div class="feature-item">
              <div class="feature-icon"><i class="bi bi-shield-check"></i></div>
              Your account stays safe
            </div>
          </div>
        </div>
      </div>

      <div class="right-panel">
        <div class="form-header">
          <h2>Set New Password</h2>
          <p>Enter your new password below.</p>
        </div>

        <div
          id="successMsg"
          style="
            display: none;
            background: #e6f9ee;
            border: 1px solid #00c853;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            color: #007a33;
            font-size: 0.9rem;
          ">
          <i class="bi bi-check-circle"></i> <span id="successText"></span>
        </div>

        <div
          id="errorMsg"
          style="
            display: none;
            background: #fff0f0;
            border: 1px solid #e53935;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            color: #c62828;
            font-size: 0.9rem;
          ">
          <i class="bi bi-exclamation-circle"></i> <span id="errorText"></span>
        </div>

        <div class="form-group">
          <label>New Password</label>
          <div class="password-wrap">
            <input
              type="password"
              id="newPassword"
              placeholder="Minimum 8 characters" />
            <button
              type="button"
              class="toggle-pass"
              onclick="togglePass('newPassword')">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label>Confirm New Password</label>
          <div class="password-wrap">
            <input
              type="password"
              id="confirmPassword"
              placeholder="Repeat your new password" />
            <button
              type="button"
              class="toggle-pass"
              onclick="togglePass('confirmPassword')">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <button onclick="resetPassword()" id="resetBtn" class="login-btn">
          Reset Password
        </button>

        <div class="signup-link" style="margin-top: 16px">
          <a href="login.html">Back to Login</a>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script>
      function togglePass(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
      }

      function resetPassword() {
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");
        const email = params.get("email");

        const errorMsg = document.getElementById("errorMsg");
        const successMsg = document.getElementById("successMsg");
        errorMsg.style.display = "none";
        successMsg.style.display = "none";

        if (!newPassword || newPassword.length < 8) {
          document.getElementById("errorText").textContent =
            "Password must be at least 8 characters";
          errorMsg.style.display = "block";
          return;
        }

        if (newPassword !== confirmPassword) {
          document.getElementById("errorText").textContent =
            "Passwords do not match";
          errorMsg.style.display = "block";
          return;
        }

        if (!token || !email) {
          document.getElementById("errorText").textContent =
            "Invalid reset link. Please request a new one.";
          errorMsg.style.display = "block";
          return;
        }

        const btn = document.getElementById("resetBtn");
        btn.textContent = "Resetting...";
        btn.style.opacity = "0.7";

        fetch(`${API_URL}/api/auth/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, token, newPassword }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (
              data.message ===
              "Password reset successfully! You can now log in."
            ) {
              document.getElementById("successText").textContent = data.message;
              successMsg.style.display = "block";
              btn.textContent = "Done!";
              setTimeout(() => (window.location.href = "login.html"), 2000);
            } else {
              document.getElementById("errorText").textContent = data.message;
              errorMsg.style.display = "block";
              btn.textContent = "Reset Password";
              btn.style.opacity = "1";
            }
          })
          .catch(() => {
            document.getElementById("errorText").textContent =
              "Something went wrong. Try again.";
            errorMsg.style.display = "block";
            btn.textContent = "Reset Password";
            btn.style.opacity = "1";
          });
      }
    </script>
  </body>
</html>
